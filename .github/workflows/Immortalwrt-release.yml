name: Immortalwrt release

on:
  # push:
  #     branches:
  #       - master
  #     paths:
  #       - 'SWITCH'
  schedule:
    - cron: '0 3 1 * *'
  watch:
    types: [started]

jobs:

  build:

    runs-on: debian-11
    if: github.repository_owner_id == github.event.sender.id || github.event_name == 'schedule'

    steps:
      - name: Show system
        run: |
          echo -e "Total CPU cores\t: $(nproc)"
          cat /proc/cpuinfo | grep 'model name'
          cpu_name=$(cat /proc/cpuinfo | grep "model name" | head -n 1 | awk -F: '{print $2}' | sed 's/^[ \t]*//')
          if [[ "$cpu_name" =~ "8370C" || "$cpu_name" =~ "7763" ]]; then
            echo "CPU为8370C或7763，继续执行命令"
            ulimit -a
          else
            echo "CPU不为8370C或7763，性能不足，停止执行命令"
            exit 1
          fi
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 512
          temp-reserve-mb: 128
          root-reserve-mb: 3072
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
      - name: Init build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo /bin/bash -c "$(curl -sL https://git.io/vokNn)"
          sudo -E apt-fast -y -qq install asciidoc bash bcc bin86 binutils bison bzip2 clang file flex g++ g++-multilib gawk gcc-multilib gettext git gzip help2man intltool libbpf-dev libboost-dev libelf-dev libncurses-dev libssl-dev libthread-queue-any-perl libusb-dev libxml-parser-perl linux-tools-generic llvm make patch perl-modules pkg-config python3-dev python3-pip python3-pyelftools python3-setuptools rsync sharutils swig time unzip util-linux wget xsltproc zlib1g-dev zip zstd
          sudo -E apt-fast -y -qq install dos2unix dwarves jq npm quilt
          sudo -E npm install -g pnpm
          sudo -E npm install -g n
          sudo -E n stable
          pip3 install --user -U pylibfdt --break-system-packages
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo -E git config --global user.name 'GitHub Actions' && git config --global user.email 'noreply@github.com'
          sudo -E git config --global core.abbrev auto
          df -h
      - name: Checkout
        uses: actions/checkout@main
      - name: Prepare Sources
        id: prepare
        run: |
          sudo chown -R runner:runner /home/runner/work/R2S-R4S-OpenWrt
          latest_release="$(curl -s https://github.com/immortalwrt/immortalwrt/tags | grep -Eo "v[0-9\.]+\-*r*c*[0-9]*.tar.gz" | sed -n '/[2-9][0-9]/p' | sed -n 1p | sed 's/.tar.gz//g')"
          git clone -b ${latest_release} --depth 1 https://github.com/immortalwrt/immortalwrt.git openwrt
          echo "latest_release=${latest_release}" >>$GITHUB_ENV
      - name: Prepare Package
        run: |
          cd openwrt
          cp -f ../SCRIPTS/prepare_package.sh ./prepare_package.sh
          /bin/bash prepare_package.sh
      - name: Make Config
        run: |
          cd openwrt
          mv ../SEED/config-release.seed .config
          sed -i '/CONFIG_TARGET_ROOTFS_SQUASHFS/d' .config
          make defconfig
      - name: Make Download
        run: |
          df -h
          cd openwrt
          make download -j50
      - name: Compile Openwrt
        id: compileopenwrt
        continue-on-error: true
        run: |
          df -h
          cd openwrt
          make -j$(($(nproc) + 1)) || make -j$(($(nproc) + 1)) V=s
          echo $?
      - name: If Error
        if: steps.compileopenwrt.outcome == 'failure'
        run: |
          cat openwrt/.config
          echo '================================================================'
          cd openwrt && make -j1 V=s
      - name: Print Disk Space After
        run: df -h
      - name: Assemble Artifact
        id: assemble_artifact
        run: |
          rm -rf ./artifact/
          mkdir -p ./artifact/
          mv openwrt/bin/targets/rockchip/armv8/*sysupgrade.img* ./artifact/
          cd ./artifact/
          gzip -d *.gz && exit 0
          gzip *.img
          releaseTag=${{ env.latest_release }}
          sha256sum *.gz | tee R2S-R4S-OPoA-$releaseTag-$(date +%Y-%m-%d).sha256sum
          mv *r2s*ext4* ./R2S-OPoA-$releaseTag-$(date +%Y-%m-%d)-ext4.img.gz
          mv *r4s*ext4* ./R4S-OPoA-$releaseTag-$(date +%Y-%m-%d)-ext4.img.gz
          mv *r2s*squashfs* ./R2S-OPoA-$releaseTag-$(date +%Y-%m-%d)-sfs.img.gz
          mv *r4s*squashfs* ./R4S-OPoA-$releaseTag-$(date +%Y-%m-%d)-sfs.img.gz
          cd ../openwrt
          cp .config ../artifact/config-full.seed
          ./scripts/diffconfig.sh > ../artifact/config-diff.seed
          release_tag="R2S-R4S-OPoA-$releaseTag-$(date +%Y-%m-%d)"
          echo "release_tag=${release_tag}" >>$GITHUB_ENV
      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ env.release_tag }}-artifact
          path: ./artifact/
      - name: Create release
        id: create_release
        uses: ncipollo/release-action@main
        with:
          name: ${{ env.release_tag }}-ROM
          allowUpdates: true
          tag: ${{ env.release_tag }}
          commit: master
          replacesArtifacts: true
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ./artifact/*.gz,./artifact/*.seed,./artifact/*.sha256sum
